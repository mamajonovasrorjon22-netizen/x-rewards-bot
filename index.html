<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>X-REWARDS PRO | HARD MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #9d3cfb;
            --primary-dark: #7a2bc9;
            --bg: #0a0a0f;
            --card: #12121a;
            --gold: #ffca28;
            --win: #4caf50;
            --lose: #f44336;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 15px 20px; 
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(157, 60, 251, 0.3);
        }
        
        .logo {
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .bal-box {
            background: rgba(255, 202, 40, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        
        .container { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 12px; 
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card { 
            background: linear-gradient(145deg, var(--card), #0e0e14);
            border-radius: 20px; 
            padding: 15px 8px; 
            text-align: center; 
            border: 1px solid #252535;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .card:active { transform: scale(0.96); border-color: var(--primary); }
        .card i { font-size: 32px; display: block; margin-bottom: 5px; }
        .card b { font-size: 12px; }
        .card small { font-size: 9px; color: #888; display: block; }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .close { 
            position: absolute; top: 20px; right: 25px; font-size: 40px; 
            color: #888; cursor: pointer;
        }
        
        .game-view { width: 95%; max-width: 380px; text-align: center; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .btn-action { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 12px 20px; border-radius: 50px; 
            font-weight: bold; font-size: 16px; margin: 15px auto; width: 80%;
            cursor: pointer;
        }
        
        #wheel { 
            width: 240px; height: 240px; border-radius: 50%; 
            border: 3px solid var(--gold); margin: 20px auto;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1);
            background: conic-gradient(#ff4757 0deg 72deg, #1e90ff 72deg 144deg, #2ed573 144deg 216deg, #ffa502 216deg 288deg, #9d3cfb 288deg 360deg);
        }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--gold); z-index: 15; }
        
        .slot-reels {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 55px;
            background: #0a0a0f;
            padding: 20px;
            border-radius: 15px;
            margin: 20px;
        }
        
        .win-glow { animation: winFlash 0.6s ease; }
        @keyframes winFlash {
            0%, 100% { text-shadow: none; }
            50% { text-shadow: 0 0 20px var(--win); color: var(--win); }
        }
        
        .lose-shake { animation: shake 0.3s ease; }
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-5px); }
            75%{ transform: translateX(5px); }
        }
        
        .warning {
            color: var(--lose);
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">⚡ X-REWARDS | HARD MODE</div>
    <div class="bal-box">🪙 <span id="bal">1</span></div>
</div>

<div class="container">
    <div class="card" onclick="openGame('wheel')"><i>🎡</i><b>Wheel</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('slots')"><i>🎰</i><b>Slots</b><small>🎲 tikish: 2</small></div>
    <div class="card" onclick="openGame('dice')"><i>🎲</i><b>Dice</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('coin')"><i>🪙</i><b>Coin</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('box')"><i>🎁</i><b>Box</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('apple')"><i>🍎</i><b>Apple</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('rps')"><i>✂️</i><b>RPS</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('card')"><i>🃏</i><b>Cards</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('guess')"><i>🔢</i><b>Guess</b><small>🎲 tikish: 1</small></div>
    <div class="card" onclick="openGame('bomb')"><i>💣</i><b>Mines</b><small>🎲 tikish: 1</small></div>
</div>

<div id="overlay">
    <div class="close" onclick="closeGame()">×</div>
    <div id="game-content" class="game-view"></div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let balance = 1;  // BOSHLANG'ICH BALANS 1 TANGA!
    let rotation = 0;
    tg.expand();
    
    function updateBal() { 
        document.getElementById('bal').innerText = Math.floor(balance);
    }
    
    // TIKISH (har bir o'yin uchun)
    function pay(amount = 1) { 
        if(balance < amount) { 
            alert("❌ Tanga yetarli emas! Kunlik bonus oling yoki keyinroq urinib ko'ring!");
            return false; 
        }
        balance -= amount; 
        updateBal(); 
        return true; 
    }
    
    // YUTUQ (qiyinlashtirilgan)
    function win(amount) { 
        balance += amount; 
        updateBal(); 
        return amount;
    }
    
    // TASODIFIY YUTUQ (kichik ehtimol)
    function getRandomWin() {
        let r = Math.random();
        if(r < 0.15) return 3;      // 15% - 3 tanga
        if(r < 0.35) return 2;      // 20% - 2 tanga
        if(r < 0.50) return 1;      // 15% - 1 tanga
        return 0;                    // 50% - yutuq yo'q
    }
    
    // JACKPOT (juda kam)
    function getJackpot() {
        if(Math.random() < 0.05) {   // 5% jackpot
            return Math.floor(Math.random() * 5) + 5; // 5-10 tanga
        }
        return 0;
    }
    
    function createParticles() {
        // oddiy effekt
    }
    
    function openGame(game) {
        const c = document.getElementById('game-content');
        document.getElementById('overlay').style.display = 'flex';
        c.innerHTML = "";
        
        let templates = {
            wheel: `<div style="position:relative; width:240px; margin:auto;"><div class="wheel-pointer"></div><div id="wheel"></div></div><h3 id="msg">🎡 Tikish: 1 tanga</h3><button class="btn-action" onclick="runWheel()">AYLANTIR</button><div class="warning">⚠️ Yutish ehtimoli 50%</div>`,
            slots: `<div class="slot-reels" id="slotRes">🎰 🎰 🎰</div><button class="btn-action" onclick="runSlots()">TORTISH (2 tanga)</button><div class="warning">⚠️ Jackpot 5%</div>`,
            dice: `<div id="diceRes" style="font-size: 80px; margin: 30px;">🎲</div><button class="btn-action" onclick="runDice()">TASHLASH (1 tanga)</button><div class="warning">⚠️ 4-5-6 yutsa 2-3 tanga</div>`,
            coin: `<div id="coinRes" style="font-size: 80px;">🪙</div><div style="display:flex; gap:10px; justify-content:center"><button class="btn-action" onclick="runCoin('B')">🦅 BURGUT</button><button class="btn-action" onclick="runCoin('G')">🏛️ GERB</button></div><div class="warning">⚠️ To'g'ri topsangiz 2 tanga</div>`,
            box: `<div style="display:flex; gap:15px; justify-content:center;"><div onclick="runBox(this)" style="font-size:60px; cursor:pointer; background:#222; padding:10px; border-radius:15px;">🎁</div><div onclick="runBox(this)" style="font-size:60px; cursor:pointer; background:#222; padding:10px; border-radius:15px;">🎁</div><div onclick="runBox(this)" style="font-size:60px; cursor:pointer; background:#222; padding:10px; border-radius:15px;">🎁</div></div><div class="warning">⚠️ 1-5 tanga orasida</div>`,
            apple: `<div id="appleRes" style="font-size: 80px;">🍏</div><button class="btn-action" onclick="runApple()">TER (1 tanga)</button><div class="warning">⚠️ 40% yutish, 60% yutqazish</div>`,
            rps: `<div id="rpsRes" style="font-size:60px;">🤖 ?</div><div style="display:flex; gap:5px"><button class="btn-action" onclick="runRPS('✊')">✊</button><button class="btn-action" onclick="runRPS('✋')">✋</button><button class="btn-action" onclick="runRPS('✌️')">✌️</button></div><div class="warning">⚠️ Yutsangiz 2 tanga</div>`,
            card: `<div id="cardRes" style="font-size:80px;">🃟</div><button class="btn-action" onclick="runCard()">OCH (1 tanga)</button><div class="warning">⚠️ Qizil kelsa 2 tanga, qora kelsa 1 tanga</div>`,
            guess: `<h3>1, 2 yoki 3?</h3><div style="display:flex; gap:10px"><button class="btn-action" style="width:60px" onclick="runGuess(1)">1</button><button class="btn-action" style="width:60px" onclick="runGuess(2)">2</button><button class="btn-action" style="width:60px" onclick="runGuess(3)">3</button></div><div class="warning">⚠️ To'g'ri topsangiz 3 tanga</div>`,
            bomb: `<div id="bombRes" style="font-size:80px;">⛏️</div><button class="btn-action" onclick="runBomb()">QAZISH (1 tanga)</button><div class="warning">⚠️ 35% xazina topish, 65% portlash</div>`
        };
        c.innerHTML = templates[game];
        
        if(game === 'wheel') {
            setTimeout(() => {
                let wheel = document.getElementById('wheel');
                if(wheel) {
                    let sectors = [0,1,2,3,4];
                    // wheel style set
                }
            }, 100);
        }
    }
    
    // WHEEL - qiyin
    function runWheel() {
        if(!pay(1)) return;
        const wheel = document.getElementById('wheel');
        const msg = document.getElementById('msg');
        let spins = 1800 + Math.floor(Math.random() * 1800);
        rotation += spins;
        wheel.style.transform = `rotate(${rotation}deg)`;
        setTimeout(() => {
            let finalAngle = rotation % 360;
            let prize = 0;
            // Qiyinlashtirilgan yutuq zonasi
            if(finalAngle < 45) prize = 3;      // 12.5%
            else if(finalAngle < 90) prize = 2;  // 12.5%
            else if(finalAngle < 135) prize = 1; // 12.5%
            else prize = 0;                      // 62.5% yutuq yo'q
            
            if(prize > 0) {
                win(prize);
                msg.innerHTML = `🎉 YUTUQ: ${prize} tanga! 🎉`;
                msg.style.color = "#4caf50";
            } else {
                msg.innerHTML = `😭 YUTUQ YO'Q! Qaytadan urinib ko'ring!`;
                msg.style.color = "#f44336";
            }
            msg.classList.add('win-glow');
            setTimeout(() => msg.classList.remove('win-glow'), 800);
        }, 4000);
    }
    
    // SLOTS - qiyin (2 tanga tikish)
    function runSlots() {
        if(!pay(2)) return;
        let symbols = ['🍒','🍋','🍊','💎','7️⃣'];
        let reel = document.getElementById('slotRes');
        let a = symbols[Math.floor(Math.random()*5)];
        let b = symbols[Math.floor(Math.random()*5)];
        let c = symbols[Math.floor(Math.random()*5)];
        
        reel.classList.add('lose-shake');
        setTimeout(() => {
            reel.innerText = `${a} ${b} ${c}`;
            reel.classList.remove('lose-shake');
            
            let jack = getJackpot();
            if(jack > 0 && a === b && b === c) {
                win(jack);
                alert(`🔥 JACKPOT! ${jack} tanga yutdingiz!`);
            }
            else if(a === b || b === c || a === c) {
                let small = Math.random() < 0.3 ? 2 : 1;
                win(small);
                if(small > 0) alert(`🎉 Yutuq: ${small} tanga!`);
                else alert(`❌ Yutuq yo'q!`);
            } else {
                alert(`❌ Yutuq yo'q! -2 tanga`);
            }
        }, 300);
    }
    
    // DICE - qiyin
    function runDice() {
        if(!pay(1)) return;
        let diceDiv = document.getElementById('diceRes');
        let val = Math.floor(Math.random()*6)+1;
        let diceMap = ['⚀','⚁','⚂','⚃','⚄','⚅'];
        diceDiv.style.transform = 'rotate(360deg)';
        setTimeout(() => {
            diceDiv.innerText = diceMap[val-1];
            diceDiv.style.transform = 'rotate(0deg)';
            if(val >= 5) {
                win(3);
                alert(`🎲 6! +3 tanga`);
            } else if(val >= 4) {
                win(2);
                alert(`🎲 5-4! +2 tanga`);
            } else if(val === 3) {
                win(1);
                alert(`🎲 3! +1 tanga`);
            } else {
                alert(`🎲 ${val}! Yutuq yo'q!`);
            }
        }, 200);
    }
    
    // COIN - qiyin
    function runCoin(choice) {
        if(!pay(1)) return;
        let res = Math.random() < 0.45 ? 'B' : 'G';
        let coinDiv = document.getElementById('coinRes');
        coinDiv.innerText = res === 'B' ? '🦅' : '🏛️';
        if(choice === res) {
            win(2);
            alert("✅ To'g'ri! +2 tanga");
        } else {
            alert("❌ Noto'g'ri! -1 tanga");
        }
    }
    
    // BOX - qiyin
    function runBox(el) {
        if(!pay(1)) return;
        let reward = Math.random() < 0.4 ? Math.floor(Math.random() * 4) + 1 : 0;
        if(reward > 0) {
            el.innerText = `💰 ${reward}`;
            win(reward);
            alert(`🎁 Sovg'a: ${reward} tanga!`);
        } else {
            el.innerText = `💀 0`;
            alert(`❌ Sovg'a yo'q! -1 tanga`);
        }
        setTimeout(() => el.innerText = '🎁', 1000);
    }
    
    // APPLE - qiyin (40% yutish)
    function runApple() {
        if(!pay(1)) return;
        let appleDiv = document.getElementById('appleRes');
        let success = Math.random() < 0.4;
        if(success) {
            let prize = Math.random() < 0.5 ? 2 : 1;
            appleDiv.innerText = '🍎✨';
            win(prize);
            alert(`🍎 Olma! +${prize} tanga`);
        } else {
            appleDiv.innerText = '🐛💔';
            alert(`🐛 Qurt chiqdi! -1 tanga`);
        }
        setTimeout(() => appleDiv.innerText = '🍏', 1000);
    }
    
    // RPS - qiyin
    function runRPS(player) {
        if(!pay(1)) return;
        let bot = ['✊','✋','✌️'][Math.floor(Math.random()*3)];
        let resDiv = document.getElementById('rpsRes');
        resDiv.innerText = `🤖 ${bot}`;
        if((player === '✊' && bot === '✌️') || (player === '✋' && bot === '✊') || (player === '✌️' && bot === '✋')) {
            win(2);
            alert("🎉 Siz yutdingiz! +2 tanga");
        } else if(player === bot) {
            alert("Durrang! Tanga qaytarildi");
            balance += 1;
            updateBal();
        } else {
            alert("❌ Bot yutdi! -1 tanga");
        }
    }
    
    // CARDS - qiyin
    function runCard() {
        if(!pay(1)) return;
        let cards = ['♠️','♥️','♣️','♦️'];
        let card = cards[Math.floor(Math.random()*4)];
        document.getElementById('cardRes').innerText = card;
        if(card === '♥️' || card === '♦️') {
            win(2);
            alert(`🃏 ${card} - Qizil! +2 tanga`);
        } else {
            alert(`🃏 ${card} - Qora! Yutuq yo'q`);
        }
    }
    
    // GUESS - qiyin
    function runGuess(num) {
        if(!pay(1)) return;
        let secret = Math.floor(Math.random()*3)+1;
        if(num === secret) {
            win(3);
            alert(`✅ To'g'ri! +3 tanga (javob ${secret})`);
        } else {
            alert(`❌ Xato! Javob ${secret} edi`);
        }
    }
    
    // BOMB - qiyin (35% xazina)
    function runBomb() {
        if(!pay(1)) return;
        let bombDiv = document.getElementById('bombRes');
        let success = Math.random() < 0.35;
        if(success) {
            let prize = Math.floor(Math.random() * 4) + 2;
            bombDiv.innerText = '💎✨';
            win(prize);
            alert(`💎 Xazina! +${prize} tanga`);
        } else {
            bombDiv.innerText = '💥💣';
            alert(`💥 Portladi! -1 tanga`);
        }
        setTimeout(() => bombDiv.innerText = '⛏️', 1000);
    }
    
    function closeGame() { 
        document.getElementById('overlay').style.display = 'none'; 
    }
    
    updateBal();
</script>
</body>
</html>
