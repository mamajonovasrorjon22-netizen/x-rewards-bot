<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>X-REWARDS | MODERN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2a;
            --neon-purple: #9d3cfb;
            --neon-pink: #ff2d75;
            --neon-cyan: #00d4ff;
            --gold: #ffca28;
            --gold-glow: rgba(255, 202, 40, 0.3);
            --success: #00e676;
            --danger: #ff1744;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-primary);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Gradient Background Animation */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at top, var(--bg-secondary), var(--bg-primary));
        }

        .gradient-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(157,60,251,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Glassmorphism Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            background: linear-gradient(135deg, #fff, var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(255, 202, 40, 0.15), rgba(157, 60, 251, 0.1));
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--gold-glow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .balance-card span:first-child {
            font-size: 14px;
        }

        .balance-card span:last-child {
            font-size: 18px;
            color: var(--gold);
        }

        /* Game Grid */
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            max-width: 500px;
            margin: 0 auto;
        }

        .game-card {
            background: linear-gradient(145deg, var(--bg-card), rgba(26, 26, 42, 0.8));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:active {
            transform: scale(0.95);
            border-color: var(--neon-purple);
        }

        .game-icon {
            font-size: 44px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(157, 60, 251, 0.5));
        }

        .game-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .game-bet {
            font-size: 11px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .game-bet .badge {
            background: rgba(255, 202, 40, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--gold);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--glass-border);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 32px;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .close-btn:active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .game-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Modern Button */
        .btn-modern {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 16px auto;
            width: 80%;
            box-shadow: 0 4px 15px rgba(157, 60, 251, 0.3);
        }

        .btn-modern:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(157, 60, 251, 0.4);
        }

        /* Wheel */
        .wheel-container {
            position: relative;
            width: 260px;
            margin: 20px auto;
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid var(--gold);
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
            z-index: 15;
        }

        .wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1);
            background: conic-gradient(
                #ff4757 0deg 60deg,
                #1e90ff 60deg 120deg,
                #2ed573 120deg 180deg,
                #ffa502 180deg 240deg,
                #9d3cfb 240deg 300deg,
                #ff6b81 300deg 360deg
            );
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
        }

        /* Slots */
        .slot-machine {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }

        .slot-reels {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 64px;
            background: #0a0a0f;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        /* Dice animation */
        .dice-animate {
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* Win/Lose animations */
        @keyframes winPulse {
            0%, 100% { text-shadow: 0 0 0 var(--success); }
            50% { text-shadow: 0 0 30px var(--success); color: var(--success); }
        }

        @keyframes loseShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .win-animation {
            animation: winPulse 0.6s ease;
        }

        .lose-animation {
            animation: loseShake 0.3s ease;
        }

        /* Result message */
        .result-msg {
            font-size: 14px;
            padding: 12px;
            border-radius: 60px;
            margin: 12px 0;
            text-align: center;
            font-weight: 500;
        }

        .result-win {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .result-lose {
            background: rgba(255, 23, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 23, 68, 0.3);
        }

        /* Warning */
        .warning-text {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Button group */
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Particle effect */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: floatUp 0.8s forwards;
            z-index: 2000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }
    </style>
</head>
<body>

<div class="gradient-bg"></div>

<div class="navbar">
    <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">X-REWARDS</div>
    </div>
    <div class="stats">
        <div class="balance-card">
            <span>🪙</span>
            <span id="bal">1</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="game-card" onclick="openGame('wheel')">
        <div class="game-icon">🎡</div>
        <div class="game-name">Wheel</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('slots')">
        <div class="game-icon">🎰</div>
        <div class="game-name">Slots</div>
        <div class="game-bet"><span class="badge">🎲 2 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('dice')">
        <div class="game-icon">🎲</div>
        <div class="game-name">Dice</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('coin')">
        <div class="game-icon">🪙</div>
        <div class="game-name">Coin</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('box')">
        <div class="game-icon">🎁</div>
        <div class="game-name">Box</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('apple')">
        <div class="game-icon">🍎</div>
        <div class="game-name">Apple</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('rps')">
        <div class="game-icon">✂️</div>
        <div class="game-name">RPS</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('card')">
        <div class="game-icon">🃏</div>
        <div class="game-name">Cards</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('guess')">
        <div class="game-icon">🔢</div>
        <div class="game-name">Guess</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
    <div class="game-card" onclick="openGame('bomb')">
        <div class="game-icon">💣</div>
        <div class="game-name">Mines</div>
        <div class="game-bet"><span class="badge">🎲 1 tanga</span></div>
    </div>
</div>

<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <div class="close-btn" onclick="closeGame()">×</div>
        <div id="game-content"></div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let balance = 1;
    let rotation = 0;
    tg.expand();
    
    function updateBal() { 
        document.getElementById('bal').innerText = Math.floor(balance);
    }
    
    function pay(amount) {
        if(balance < amount) {
            showToast("❌ Tanga yetarli emas!", "error");
            return false;
        }
        balance -= amount;
        updateBal();
        return true;
    }
    
    function win(amount) {
        balance += amount;
        updateBal();
        createParticles('💰');
        return amount;
    }
    
    function createParticles(emoji) {
        for(let i = 0; i < 12; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.innerText = emoji;
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.bottom = '30%';
            p.style.position = 'fixed';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }
    
    function showToast(msg, type) {
        // Simple alert for now
        alert(msg);
    }
    
    function getRandomWin() {
        let r = Math.random();
        if(r < 0.12) return 3;
        if(r < 0.28) return 2;
        if(r < 0.45) return 1;
        return 0;
    }
    
    function getJackpot() {
        if(Math.random() < 0.04) {
            return Math.floor(Math.random() * 8) + 5;
        }
        return 0;
    }
    
    function openGame(game) {
        const modal = document.getElementById('modal');
        const content = document.getElementById('game-content');
        modal.classList.add('active');
        
        let templates = {
            wheel: `
                <div class="game-title">🎡 WHEEL OF FORTUNE</div>
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <div class="wheel" id="wheel"></div>
                </div>
                <div id="wheelMsg" class="result-msg" style="display:none"></div>
                <button class="btn-modern" onclick="runWheel()">🔄 AYLANTIRISH</button>
                <div class="warning-text">⚠️ Yutish ehtimoli ~45% | Maksimal yutuq: 3 tanga</div>
            `,
            slots: `
                <div class="game-title">🎰 SLOT MACHINE</div>
                <div class="slot-machine">
                    <div class="slot-reels" id="slotReels">🎰 🎰 🎰</div>
                </div>
                <button class="btn-modern" onclick="runSlots()">🎲 TORTISH (2 tanga)</button>
                <div class="warning-text">⚠️ Jackpot 4% | Maksimal 10 tanga</div>
            `,
            dice: `
                <div class="game-title">🎲 DICE ROLL</div>
                <div style="font-size: 90px; text-align: center; margin: 20px 0;" id="diceDisplay">🎲</div>
                <button class="btn-modern" onclick="runDice()">🎲 TASHLASH</button>
                <div class="warning-text">⚠️ 4-5-6 yutsa 2-3 tanga | 1-2-3 yutsa yutuq yo'q</div>
            `,
            coin: `
                <div class="game-title">🪙 COIN FLIP</div>
                <div style="font-size: 90px; text-align: center; margin: 20px 0;" id="coinDisplay">🪙</div>
                <div class="button-group">
                    <button class="btn-modern" style="width: 40%;" onclick="runCoin('B')">🦅 BURGUT</button>
                    <button class="btn-modern" style="width: 40%;" onclick="runCoin('G')">🏛️ GERB</button>
                </div>
                <div class="warning-text">⚠️ To'g'ri topsangiz 2 tanga</div>
            `,
            box: `
                <div class="game-title">🎁 MYSTERY BOX</div>
                <div class="button-group">
                    <div onclick="runBox(this)" style="font-size: 70px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;">🎁</div>
                    <div onclick="runBox(this)" style="font-size: 70px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;">🎁</div>
                    <div onclick="runBox(this)" style="font-size: 70px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;">🎁</div>
                </div>
                <div class="warning-text">⚠️ 1-4 tanga yoki 0 tanga</div>
            `,
            apple: `
                <div class="game-title">🍎 LUCKY APPLE</div>
                <div style="font-size: 90px; text-align: center; margin: 20px 0;" id="appleDisplay">🍏</div>
                <button class="btn-modern" onclick="runApple()">🍎 TERIB OLISH</button>
                <div class="warning-text">⚠️ 35% yutish ehtimoli | Yutuq: 1-2 tanga</div>
            `,
            rps: `
                <div class="game-title">✂️ ROCK PAPER SCISSORS</div>
                <div style="font-size: 70px; text-align: center; margin: 20px 0;" id="rpsDisplay">🤖 ?</div>
                <div class="button-group">
                    <button class="btn-modern" style="width: 28%;" onclick="runRPS('✊')">✊</button>
                    <button class="btn-modern" style="width: 28%;" onclick="runRPS('✋')">✋</button>
                    <button class="btn-modern" style="width: 28%;" onclick="runRPS('✌️')">✌️</button>
                </div>
                <div class="warning-text">⚠️ Yutsangiz 2 tanga | Durrangda tanga qaytariladi</div>
            `,
            card: `
                <div class="game-title">🃏 CARD PICK</div>
                <div style="font-size: 90px; text-align: center; margin: 20px 0;" id="cardDisplay">🃟</div>
                <button class="btn-modern" onclick="runCard()">🃏 KARTANI OCHISH</button>
                <div class="warning-text">⚠️ Qizil kelsa 2 tanga | Qora kelsa yutuq yo'q</div>
            `,
            guess: `
                <div class="game-title">🔢 NUMBER GUESS</div>
                <div class="button-group">
                    <button class="btn-modern" style="width: 30%;" onclick="runGuess(1)">1</button>
                    <button class="btn-modern" style="width: 30%;" onclick="runGuess(2)">2</button>
                    <button class="btn-modern" style="width: 30%;" onclick="runGuess(3)">3</button>
                </div>
                <div class="warning-text">⚠️ To'g'ri topsangiz 3 tanga</div>
            `,
            bomb: `
                <div class="game-title">💣 MINES</div>
                <div style="font-size: 90px; text-align: center; margin: 20px 0;" id="bombDisplay">⛏️</div>
                <button class="btn-modern" onclick="runBomb()">💎 QAZISH</button>
                <div class="warning-text">⚠️ 35% xazina | 65% portlash</div>
            `
        };
        
        content.innerHTML = templates[game];
        
        if(game === 'wheel') {
            setTimeout(() => {
                const wheel = document.getElementById('wheel');
                if(wheel) wheel.style.transform = 'rotate(0deg)';
            }, 100);
        }
    }
    
    // WHEEL
    function runWheel() {
        if(!pay(1)) return;
        const wheel = document.getElementById('wheel');
        const msgDiv = document.getElementById('wheelMsg');
        
        let spins = 1800 + Math.floor(Math.random() * 1800);
        rotation += spins;
        wheel.style.transform = `rotate(${rotation}deg)`;
        msgDiv.style.display = 'block';
        msgDiv.className = 'result-msg';
        msgDiv.innerHTML = '🌀 Aylanmoqda...';
        
        setTimeout(() => {
            let finalAngle = rotation % 360;
            let prize = 0;
            if(finalAngle < 50) prize = 3;
            else if(finalAngle < 100) prize = 2;
            else if(finalAngle < 150) prize = 1;
            else prize = 0;
            
            if(prize > 0) {
                win(prize);
                msgDiv.className = 'result-msg result-win';
                msgDiv.innerHTML = `🎉 YUTUQ! +${prize} tanga! 🎉`;
                createParticles('✨');
            } else {
                msgDiv.className = 'result-msg result-lose';
                msgDiv.innerHTML = `😭 YUTUQ YO'Q! Qaytadan urinib ko'ring!`;
            }
        }, 4000);
    }
    
    // SLOTS
    function runSlots() {
        if(!pay(2)) return;
        let symbols = ['🍒', '🍋', '🍊', '💎', '7️⃣', '⭐'];
        let reel = document.getElementById('slotReels');
        let a = symbols[Math.floor(Math.random() * 6)];
        let b = symbols[Math.floor(Math.random() * 6)];
        let c = symbols[Math.floor(Math.random() * 6)];
        
        reel.classList.add('lose-animation');
        setTimeout(() => {
            reel.innerText = `${a} ${b} ${c}`;
            reel.classList.remove('lose-animation');
            
            let jack = getJackpot();
            if(jack > 0 && a === b && b === c) {
                win(jack);
                createParticles('💎');
                alert(`🔥 JACKPOT! ${jack} tanga yutdingiz!`);
            } else if(a === b || b === c || a === c) {
                let small = Math.random() < 0.4 ? 2 : 1;
                win(small);
                alert(`🎉 Yutuq: ${small} tanga!`);
            } else {
                alert(`❌ Yutuq yo'q! -2 tanga`);
            }
        }, 300);
    }
    
    // DICE
    function runDice() {
        if(!pay(1)) return;
        let diceDiv = document.getElementById('diceDisplay');
        let val = Math.floor(Math.random() * 6) + 1;
        let diceMap = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        
        diceDiv.style.transform = 'rotate(360deg)';
        setTimeout(() => {
            diceDiv.innerText = diceMap[val - 1];
            diceDiv.style.transform = 'rotate(0deg)';
            
            if(val >= 5) {
                win(3);
                alert(`🎲 ${val}! +3 tanga`);
            } else if(val >= 4) {
                win(2);
                alert(`🎲 ${val}! +2 tanga`);
            } else if(val === 3) {
                win(1);
                alert(`🎲 ${val}! +1 tanga`);
            } else {
                alert(`🎲 ${val}! Yutuq yo'q!`);
            }
        }, 200);
    }
    
    // COIN
    function runCoin(choice) {
        if(!pay(1)) return;
        let res = Math.random() < 0.45 ? 'B' : 'G';
        let coinDiv = document.getElementById('coinDisplay');
        coinDiv.innerText = res === 'B' ? '🦅' : '🏛️';
        
        if(choice === res) {
            win(2);
            alert("✅ To'g'ri! +2 tanga");
        } else {
            alert("❌ Noto'g'ri! -1 tanga");
        }
    }
    
    // BOX
    function runBox(el) {
        if(!pay(1)) return;
        let reward = Math.random() < 0.45 ? Math.floor(Math.random() * 5) + 1 : 0;
        if(reward > 0) {
            el.innerText = `💰 ${reward}`;
            win(reward);
            alert(`🎁 ${reward} tanga topdingiz!`);
        } else {
            el.innerText = '💀';
            alert(`❌ Hech narsa yo'q! -1 tanga`);
        }
        setTimeout(() => el.innerText = '🎁', 1000);
    }
    
    // APPLE
    function runApple() {
        if(!pay(1)) return;
        let appleDiv = document.getElementById('appleDisplay');
        let success = Math.random() < 0.35;
        
        if(success) {
            let prize = Math.random() < 0.5 ? 2 : 1;
            appleDiv.innerText = '🍎✨';
            win(prize);
            alert(`🍎 Olma! +${prize} tanga`);
        } else {
            appleDiv.innerText = '🐛💔';
            alert(`🐛 Qurt chiqdi! -1 tanga`);
        }
        setTimeout(() => appleDiv.innerText = '🍏', 1000);
    }
    
    // RPS
    function runRPS(player) {
        if(!pay(1)) return;
        let bot = ['✊', '✋', '✌️'][Math.floor(Math.random() * 3)];
        let resDiv = document.getElementById('rpsDisplay');
        resDiv.innerText = `🤖 ${bot}`;
        
        if((player === '✊' && bot === '✌️') || (player === '✋' && bot === '✊') || (player === '✌️' && bot === '✋')) {
            win(2);
            alert("🎉 Siz yutdingiz! +2 tanga");
        } else if(player === bot) {
            alert("Durrang! Tanga qaytarildi");
            balance += 1;
            updateBal();
        } else {
            alert("❌ Bot yutdi! -1 tanga");
        }
    }
    
    // CARDS
    function runCard() {
        if(!pay(1)) return;
        let cards = ['♠️', '♥️', '♣️', '♦️'];
        let card = cards[Math.floor(Math.random() * 4)];
        document.getElementById('cardDisplay').innerText = card;
        
        if(card === '♥️' || card === '♦️') {
            win(2);
            alert(`🃏 ${card} - Qizil! +2 tanga`);
        } else {
            alert(`🃏 ${card} - Qora! Yutuq yo'q`);
        }
    }
    
    // GUESS
    function runGuess(num) {
        if(!pay(1)) return;
        let secret = Math.floor(Math.random() * 3) + 1;
        if(num === secret) {
            win(3);
            alert(`✅ To'g'ri! +3 tanga (javob ${secret})`);
        } else {
            alert(`❌ Xato! Javob ${secret} edi`);
        }
    }
    
    // BOMB
    function runBomb() {
        if(!pay(1)) return;
        let bombDiv = document.getElementById('bombDisplay');
        let success = Math.random() < 0.35;
        
        if(success) {
            let prize = Math.floor(Math.random() * 5) + 2;
            bombDiv.innerText = '💎✨';
            win(prize);
            alert(`💎 Xazina! +${prize} tanga`);
        } else {
            bombDiv.innerText = '💥💣';
            alert(`💥 Portladi! -1 tanga`);
        }
        setTimeout(() => bombDiv.innerText = '⛏️', 1000);
    }
    
    function closeGame() {
        document.getElementById('modal').classList.remove('active');
    }
    
    updateBal();
</script>
</body>
</html>
